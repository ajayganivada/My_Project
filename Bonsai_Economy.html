<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bonsai Economy | Vibrant Botanical Portal</title>
    <style>
      :root {
        --primary: #2e7d32;
        --secondary: #388e3c;
        --accent: #4caf50;
        --bg-bright: #f0fdf4;
        --card-white: #ffffff;
        --text-main: #1b2e1b;
      }

      body {
        /* Smaller base font size and cleaner system font stack */
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 14px;
        margin: 0;
        background: var(--bg-bright);
        color: var(--text-main);
        overflow-x: hidden;
      }

      .auth-overlay {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)),
          url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80");
        background-size: cover;
        background-position: center;
        z-index: 9000;
        justify-content: center;
        align-items: center;
      }

      .form-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        border: 1px solid var(--accent);
      }

      .form-box h1 {
        color: var(--primary);
        font-weight: 800;
        margin-top: 0;
        letter-spacing: -1px;
        font-size: 24px; /* Reduced from 32px */
      }

      .form-box input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        background: #fff;
        color: #333;
        font-family: inherit;
        font-size: 13px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 6px;
        font-weight: bold;
        font-size: 13px; /* Reduced from 16px */
        transition: 0.3s;
        font-family: inherit;
      }

      .btn:hover {
        background: var(--secondary);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
      }

      #main-content {
        display: none;
        opacity: 0;
        transition: opacity 1s ease;
        background:
          linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)),
          url("https://images.unsplash.com/photo-1510137600163-2729bc6959a6?auto=format&fit=crop&w=1920&q=80");
        background-attachment: fixed;
        background-size: cover;
        min-height: 100vh;
      }

      .header-container {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 5%;
        background: #ffffff;
        border-bottom: 2px solid var(--primary);
      }

      .logo {
        height: 35px; /* Reduced from 45px */
        width: auto;
      }

      .brand-name {
        color: #2e7d32;
        font-size: 22px; /* Reduced from 28px */
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .logout-btn {
        margin-left: auto;
        background: var(--primary);
        border: none;
        color: white;
        padding: 8px 20px;
        border-radius: 30px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
        transition: 0.3s;
      }

      .nav {
        background: var(--primary);
        padding: 10px 5%;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        align-items: center;
      }

      .it {
        color: #fff;
        font-size: 12px; /* Reduced from 15px */
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.3s;
        padding: 5px 10px;
        border-radius: 4px;
      }

      .it:hover,
      .it.active {
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
      }

      .mode-status {
        background: #ffffff;
        padding: 12px 5%;
        font-weight: bold;
        font-size: 16px; /* Reduced from 20px */
        color: var(--primary);
        text-align: center;
        border-bottom: 1px solid #e8f5e9;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 30px 20px;
        padding: 40px 5%;
      }

      @media (max-width: 1100px) {
        .container { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 600px) {
        .container { grid-template-columns: 1fr; }
      }

      .tree-card {
        background: var(--card-white);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        cursor: pointer;
        transition: 0.4s;
        border: 1px solid #e0f2f1;
      }

      .tree-card:hover {
        transform: translateY(-8px);
        border-color: var(--accent);
        box-shadow: 0 10px 25px rgba(46, 125, 50, 0.15);
      }
      .tree-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      .card-info {
        padding: 15px;
        text-align: center;
        background: #fafafa;
        border-top: 1px solid #eee;
      }
      .card-info h2 {
        font-size: 16px; /* Reduced from 20px */
        margin: 0;
        color: var(--primary);
        font-weight: 700;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.98);
        z-index: 9999;
        overflow-y: auto;
      }

      .modal-body {
        display: flex;
        flex-wrap: wrap;
        min-height: 100vh;
      }
      .img-side {
        flex: 1 1 45%;
        background: #f9fbf9;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .img-side img {
        max-width: 90%;
        max-height: 75vh;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }
      .text-side {
        flex: 1 1 55%;
        padding: 50px;
        line-height: 1.7; /* Reduced from 2 for a tighter look */
        text-align: justify;
        font-size: 15px; /* Reduced from 18px */
        color: #333;
        background: #ffffff;
      }

      .close-btn {
        position: fixed;
        top: 20px;
        right: 30px;
        padding: 10px 25px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
        z-index: 10001;
      }

      .contact-box {
        grid-column: span 4;
        background: var(--card-white);
        padding: 40px;
        border-radius: 12px;
        max-width: 550px;
        width: 100%;
        margin: 0 auto;
        border: 2px solid var(--accent);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      .contact-box input,
      .contact-box textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #eee;
        border-radius: 6px;
        background: #fff;
        color: #333;
        font-family: inherit;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="auth-screen" class="auth-overlay">
      <div class="form-box">
        <h1>BONSAI ECONOMY</h1>
        <form id="auth-form" autocomplete="off">
          <div id="reg-box" style="display: none">
            <input type="text" id="fname" placeholder="First Name" />
            <input type="email" id="email" placeholder="Email Address" />
          </div>
          <input type="text" id="un" placeholder="Username" required />
          <input type="password" id="pw" placeholder="Password" required />
          <button type="submit" id="sub-btn" class="btn">LOGIN</button>
        </form>
        <p id="tog" style="margin-top: 20px; font-size: 12px; cursor: pointer; color: #666;" onclick="togReg()">
          New Member? <b style="color: var(--primary); text-decoration: underline">Join Us</b>
        </p>
      </div>
    </div>

    <div id="main-content">
      <div class="header-container">
        <img src="https://logowik.com/content/uploads/images/bonsai-tree-with-green-leaves108.logowik.com.webp" alt="logo" class="logo" />
        <span class="brand-name">BONSAI ECONOMY</span>
        <button onclick="location.reload()" class="logout-btn">LOGOUT</button>
      </div>

      <div class="nav">
        <div class="it active" onclick="setMode('All')">All</div>
        <div class="it" onclick="setMode('Fresh')">Fresh</div>
        <div class="it" onclick="setMode('Seeds')">Seeds</div>
        <div class="it" onclick="setMode('compost')">compost</div>
        <div class="it" onclick="setMode('Bestseller')">Bestseller</div>
        <div class="it" onclick="setMode('Types')">Types</div>
        <div class="it" onclick="setMode('Customer Services')">Services</div>
        <div class="it" onclick="setMode('Today\'s Deals')">Deals</div>
        <div class="it" onclick="setMode('New Releases')">New</div>
        <div class="it" onclick="setMode('Soil')">Soil</div>
        <div class="it" onclick="setMode('Vermicompost')">Vermicompost</div>
        <div class="it" onclick="setMode('Testing')">Testing</div>
        <div class="it" onclick="showContact()">Contact</div>
      </div>

      <div class="mode-status" id="mode-display">Welcome to Our Vibrant Garden</div>

      <div class="container" id="gallery"></div>

      <div id="info-modal" class="modal">
        <button class="close-btn" onclick="closeModal()">BACK TO GARDEN</button>
        <div class="modal-body">
          <div class="img-side"><img id="m-img" src="" /></div>
          <div class="text-side">
            <h1 id="m-title" style="color: var(--primary); font-size: 32px; border-bottom: 4px solid var(--accent); display: inline-block; padding-bottom: 5px; margin-bottom: 20px;"></h1>
            <h3 id="m-subtitle" style="text-transform: uppercase; letter-spacing: 2px; color: #888; font-size: 12px; margin-bottom: 20px;"></h3>
            <div id="m-content"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const plants = [
        { name: "Ficus", img: "https://www.bonsaiempire.com/images/site/species/ficus-bonsai.jpg" },
        { name: "Dwarf Jade", img: "https://www.bonsaiempire.com/images/site/species/jade-bonsai.jpg" },
        { name: "Fukien Tea", img: "https://www.bonsaiempire.com/images/site/species/carmona-bonsai.jpg" },
        { name: "Azalea", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-azalea-bonsai-heike.jpg" },
        { name: "Snow Rose", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-serissa-fotoproze.jpg" },
        { name: "Bougainvillea", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-bougainvillea-IMG-6065.jpg" },
        { name: "Sweet Plum", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-sageretia-sodas.jpg" },
        { name: "Box Wood", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-buxusIMG-5917.jpg" },
        { name: "Olive", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-oliveIMG-7167.jpg" },
        { name: "Hawaiian Umbrella", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-hawaiian-umbrella.jpg" },
        { name: "Money Tree", img: "https://www.bonsaiempire.com/images/site/species/species-money-tree.jpg" },
        { name: "Privet", img: "https://www.bonsaiempire.com/images/site/species/bonsai-species-privet-saulieu2019-4457.jpg" },
      ];

      let currentMode = "All";
      let isReg = false;
      const db = JSON.parse(localStorage.getItem("bonsai_vibrant_db")) || {};

      function togReg() {
        isReg = !isReg;
        document.getElementById("reg-box").style.display = isReg ? "block" : "none";
        document.getElementById("sub-btn").innerText = isReg ? "JOIN THE FOREST" : "DISCOVER THE FOREST";
      }

      function setMode(m) {
        currentMode = m;
        document.getElementById("mode-display").innerText = `CURRENT MODE: ${m.toUpperCase()}`;
        document.querySelectorAll(".it").forEach((i) => i.classList.remove("active"));
        if (event) event.target.classList.add("active");
        render();
      }

      function render() {
        const gal = document.getElementById("gallery");
        gal.innerHTML = "";
        plants.forEach((p, i) => {
          gal.innerHTML += `
            <div class="tree-card" onclick="openModal(${i})">
              <img src="${p.img}">
              <div class="card-info">
                <h2>${p.name}</h2>
                <p style="color:var(--primary); margin-top:10px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Technical Guide</p>
              </div>
            </div>`;
        });
      }

      function showContact() {
        const gal = document.getElementById("gallery");
        document.getElementById("mode-display").innerText = "LET'S GROW TOGETHER";
        gal.innerHTML = `
          <div class="contact-box">
            <h2 style="color:var(--primary); font-weight: 800; margin-bottom: 10px; font-size: 18px;">Botanical Inquiry</h2>
            <p style="color:#666; margin-bottom:20px; font-size: 13px;">Contact our specialists for pruning and soil analysis.</p>
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email Address">
            <textarea rows="6" placeholder="Message..."></textarea>
            <button class="btn" onclick="alert('Inquiry Sent! We will bloom back shortly.')">SEND MESSAGE</button>
          </div>`;
      }

      function openModal(idx) {
        const p = plants[idx];
        document.getElementById("m-img").src = p.img;
        document.getElementById("m-title").innerText = p.name;
        document.getElementById("m-subtitle").innerText = `${currentMode} Comprehensive Botanical Profile`;

        let text = `Welcome to the detailed documentation for the <b>${p.name}</b> specimen focusing on <b>${currentMode}</b>. Cultivating a bonsai is an art of patience and precise environmental orchestration. <br><br>`;
        text += `In this vibrant analysis of <b>${currentMode}</b>, we highlight how the ${p.name} interacts with its surroundings. To exceed horticultural expertise, we observe that the ${p.name} thrives when <b>${currentMode}</b> components are optimized for seasonal growth. <br><br>`;
        text += `Detailed data indicates that specimens managed under these specific <b>${currentMode}</b> protocols develop a much stronger resistance to environmental changes and common garden pests, allowing them to live for generations.`;

        document.getElementById("m-content").innerHTML = text;
        document.getElementById("info-modal").style.display = "block";
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("info-modal").style.display = "none";
        document.body.style.overflow = "auto";
      }

      document.getElementById("auth-form").onsubmit = (e) => {
        e.preventDefault();
        const u = document.getElementById("un").value;
        const p = document.getElementById("pw").value;
        if (isReg) {
          db[u] = p;
          localStorage.setItem("bonsai_vibrant_db", JSON.stringify(db));
          alert("Success! Please manually enter your details to login.");
          togReg();
        } else {
          if (db[u] === p) {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
            setTimeout(() => (document.getElementById("main-content").style.opacity = "1"), 50);
            render();
          } else {
            alert("Invalid credentials. Please try again.");
          }
        }
      };
    </script>
  </body>
</html>
